<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amethyst i-Ready Assistant</title>
  <link rel="icon" type="image/png" href="icon.png" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5efff;
      color: #4a3e56;
      overflow-x: hidden;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Background Animation */
    .bg-animation {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .circle {
      position: absolute;
      top: -80px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(155, 102, 255, 0.25), rgba(115, 31, 255, 0.15));
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(120vh) rotate(360deg); opacity: 0; }
    }

    .circle:nth-child(1) { left: 5%; width: 60px; height: 60px; animation-duration: 11s; }
    .circle:nth-child(2) { left: 18%; width: 30px; height: 30px; animation-duration: 8s; animation-delay: 2s; }
    .circle:nth-child(3) { left: 35%; width: 75px; height: 75px; animation-duration: 14s; animation-delay: 1s; }
    .circle:nth-child(4) { left: 50%; width: 40px; height: 40px; animation-duration: 9s; animation-delay: 3s; }
    .circle:nth-child(5) { left: 65%; width: 55px; height: 55px; animation-duration: 13s; }
    .circle:nth-child(6) { left: 80%; width: 25px; animation-duration: 10s; animation-delay: 4s; } /* Fixed semicolon */

    /* UI Content Styling */
    .container {
      position: relative;
      z-index: 2;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(155, 102, 255, 0.1);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .copy-box {
      width: 100%;
      padding: 12px;
      border: 2px solid #e1d5f5;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 16px;
      color: #6c5a80;
      background: #faf8ff;
    }

    .copy-btn {
      background: linear-gradient(135deg, #9b66ff, #731fff);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      width: 100%;
    }

    .copy-btn:active {
      transform: scale(0.98);
    }

    .copy-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <!-- Background Circles -->
  <div class="bg-animation">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <!-- Main UI Elements -->
  <div class="container">
    <h2>Amethyst Assistant</h2>
    <input type="text" id="textToCopy" class="copy-box" value="Text to be copied!" readonly />
    <button id="copyButton" class="copy-btn">Copy Text</button>
  </div>

  <!-- JavaScript Functionality -->
  <script>
    document.getElementById('copyButton').addEventListener('click', () => {
      const inputElement = document.getElementById('textToCopy');
      
      // Use modern clipboard API
      navigator.clipboard.writeText(inputElement.value)
        .then(() => {
          const btn = document.getElementById('copyButton');
          btn.textContent = 'Copied!';
          btn.style.background = '#47c9a2'; // Changes button color to green on success
          
          // Reset button text after 2 seconds
          setTimeout(() => {
            btn.textContent = 'Copy Text';
            btn.style.background = 'linear-gradient(135deg, #9b66ff, #731fff)';
          }, 2000);
        })
        .catch(err => {
          console.error('Failed to copy text: ', err);
        });
    });
  </script>

</body>
</html>
